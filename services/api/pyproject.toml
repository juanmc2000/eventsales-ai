[tool.pytest.ini_options]
# Run from services/api/:  pytest
# Run a single test:       pytest tests/path/to/test_file.py::test_name
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"

# Markers for test categorisation
markers = [
    "unit: fast tests with no external dependencies",
    "integration: tests that require a live PostgreSQL database",
    "smoke: basic import and schema validation tests",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]
