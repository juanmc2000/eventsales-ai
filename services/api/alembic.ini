# Alembic configuration for EventSales AI
# Run from services/api/: alembic upgrade head

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Encoding for migration files
prepend_sys_path = .

# Timezone for file timestamps
# timezone =

# Maximum length for the "slug" portion of generated filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Version locations — single folder for POC
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# Version path separator (os, : or ;)
# version_path_separator = os


# ─── Logging ────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
